apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: platform-dev
  # annotations:
  #   cloud.google.com/load-balancer-type: "Internal"  # Ensure it's an internal load balancer
  #   cloud.google.com/neg: '{"ingress": true}'        # Enable NEG for this service
  #   networking.gke.io/load-balancer-type: "Internal" # Ensure GKE's internal LB integration
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080                              # Ensure this matches the app's listening port
      protocol: TCP                                 # Use TCP protocol for HTTP traffic
  selector:
    app: dummy-backend                               # Match the deployment's label for pod selection
  sessionAffinity: None                             # Disable session affinity unless required
  #externalTrafficPolicy: Local                      # Preserve client IP for troubleshooting and security
