version: 0.2

phases:
  install:
    commands:
      - echo Installing kubectl...
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 061039767119.dkr.ecr.ap-south-1.amazonaws.com
      - REPOSITORY_URI=061039767119.dkr.ecr.ap-south-1.amazonaws.com/aws-dummy-backend
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:7}

  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      # --load ensures the image is available for the next 'tag' command
      - docker build -t $REPOSITORY_URI:latest . --load
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Updating Kubeconfig for EKS...
      # Pointing to your specific cluster
      - aws eks update-kubeconfig --name plutos-platform-uat-eks-cluster --region ap-south-1
      - echo Deploying to Kubernetes...
      # Replaces the placeholder in your deployment.yaml with the fresh image URI
      - sed -i "s|IMAGE_PLACEHOLDER|$REPOSITORY_URI:$IMAGE_TAG|g" deployment.yaml
      - kubectl apply -f deployment.yaml
      - kubectl apply -f service.yaml
      - echo Deployment Successful!

artifacts:
  # In EKS mode, artifacts are optional because kubectl apply does the work,
  # but keeping the YAMLs as artifacts is good practice for logging.
  files:
    - deployment.yaml
    - service.yaml
